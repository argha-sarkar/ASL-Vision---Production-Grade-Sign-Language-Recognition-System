name: Docker Build

on:

  push:

    branches:
      - main
      - master

  pull_request:

    branches:
      - main
      - master

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image

        run: |

          docker build \
          -t asl-vision:latest \
          .

      - name: Verify Docker Image

        run: |

          docker images

      - name: Run Docker Container

        run: |

          docker run -d \
          --name asl-api \
          -p 8000:8000 \
          asl-vision:latest

      - name: Wait for Startup

        run: |

          sleep 30

      - name: Check Running Containers

        run: |

          docker ps

      - name: API Health Check

        run: |

          curl --retry 10 \
          --retry-delay 5 \
          http://localhost:8000/api/v1/health

      - name: Stop Container

        if: always()

        run: |

          docker stop asl-api || true

      - name: Remove Container

        if: always()

        run: |

          docker rm asl-api || true